name: CI

on:
  push:
  pull_request:

jobs:
  python-tests:
    name: Python contracts and benchmark lab
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run model contract tests
        run: python -m unittest test_model_contract.py

  windows-build:
    name: Windows CMake build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build
      - name: Build
        run: cmake --build build --config Debug -- /m:1
      - name: Run native safety and integration tests
        run: ctest --test-dir build -C Debug --output-on-failure
