name: CI

on:
  push:
  pull_request:

jobs:
  windows-validation:
    name: Windows build, tests, and package validation
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt
      - name: Configure
        run: cmake -S . -B build
      - name: Build
        run: cmake --build build --config Debug -- /m:1
      - name: Run native safety and integration tests
        run: ctest --test-dir build -C Debug --output-on-failure
      - name: Run Python model and benchmark tests
        run: python -m unittest test_model_contract.py test_benchmark_lab.py test_dataset_contract.py test_training_safety.py
      - name: Check whitespace errors
        run: git diff --check
      - name: Package dry run
        run: .\package_release.ps1 -Configuration Debug -OutputDir "$env:RUNNER_TEMP\PredictiveAutoHeal-package" -BuildParallelism 1
